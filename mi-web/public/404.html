<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Multicolor Plus</title>
    <script>
      (function () {
        var location = window.location;
        var pathParts = location.pathname.split("/").filter(Boolean);
        var hasBaseSegment = pathParts.length > 1;
        var repoBase = hasBaseSegment ? "/" + pathParts[0] : "";
        var rest = (hasBaseSegment ? pathParts.slice(1) : pathParts)
          .join("/")
          .replace(/&/g, "~and~");

        var redirectUrl =
          location.protocol +
          "//" +
          location.hostname +
          (location.port ? ":" + location.port : "") +
          repoBase +
          "/?/" +
          rest +
          (location.search ? "&" + location.search.slice(1).replace(/&/g, "~and~") : "") +
          location.hash;

        location.replace(redirectUrl);
      })();
    </script>
  </head>
  <body></body>
</html>
