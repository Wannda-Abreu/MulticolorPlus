<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Multicolor Plus</title>
    <script>
      (function () {
        var segmentCount = 1;
        var location = window.location;
        var repoBase = location.pathname
          .split("/")
          .slice(0, 1 + segmentCount)
          .join("/");
        var rest = location.pathname
          .slice(repoBase.length)
          .replace(/&/g, "~and~");

        var redirectUrl =
          location.protocol +
          "//" +
          location.hostname +
          (location.port ? ":" + location.port : "") +
          repoBase +
          "/?/" +
          rest.replace(/^\//, "") +
          (location.search ? "&" + location.search.slice(1).replace(/&/g, "~and~") : "") +
          location.hash;

        location.replace(redirectUrl);
      })();
    </script>
  </head>
  <body></body>
</html>
