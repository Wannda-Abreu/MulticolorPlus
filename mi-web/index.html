<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multicolor Plus</title>
    <script>
      (function () {
        var redirect = window.location.search;
        if (!redirect || redirect.indexOf("?/") !== 0) return;

        var restoredPath = redirect
          .slice(2)
          .replace(/~and~/g, "&");

        window.history.replaceState(
          null,
          "",
          window.location.pathname + restoredPath + window.location.hash,
        );
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
